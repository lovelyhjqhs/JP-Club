var currentFilter = "all";
var showingAll = false;

function getSvg(idx) { return svgThemes[idx % svgThemes.length]; }

function renderClubs(list) {
  var grid = document.getElementById("clubGrid");
  if (!list || !list.length) {
    grid.innerHTML = "<div class=\"no-results\"><p>暂无符合条件的社团</p></div>";
    return;
  }
  grid.innerHTML = list.map(function(c, i) {
    return "<div class=\"club-card\" onclick=\"openModal(" + c.id + ")\">" +
      "<div class=\"card-img\">" + (c.img ? "<img src=\"" + c.img + "\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">" : getSvg(c.svgIdx)) +
      "<div class=\"card-overlay\"></div><div class=\"card-badge\">" + c.cat + "</div></div>" +
      "<div class=\"card-body\"><h3>" + c.name + "</h3>" +
      "<div class=\"card-status\">2026年秋季招新</div>" +
      "<div class=\"card-desc\">" + c.desc + "…</div></div></div>";
  }).join("");
}

function filterClubs(cat) {
  currentFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(function(b) {
    b.classList.toggle("active", b.dataset.filter === cat);
  });
  var list = (cat === "all") ? allClubs : allClubs.filter(function(c) { return c.cat === cat; });
  showingAll = false;
  document.getElementById("loadMoreLabel").textContent = "展开更多社团";
  document.getElementById("loadMoreArrow").textContent = "↓";
  applyDisplay(list);
}

function applyDisplay(list) {
  if (list.length <= 12 || showingAll) { renderClubs(list); }
  else { renderClubs(list.slice(0, 12)); }
}

function toggleLoadMore() {
  showingAll = !showingAll;
  var btn = document.getElementById("loadMoreLabel");
  var arrow = document.getElementById("loadMoreArrow");
  btn.textContent = showingAll ? "收起" : "展开更多社团";
  arrow.textContent = showingAll ? "↑" : "↓";
  applyDisplay(currentFilter === "all" ? allClubs : allClubs.filter(function(c) { return c.cat === currentFilter; }));
}

function scrollToGrid() { document.getElementById("grid-top").scrollIntoView({behavior:"smooth", block:"start"}); }

function openModal(id) {
  var c = allClubs.find(function(x) { return x.id === id; });
  if (!c) return;
  document.getElementById("modalTitle").textContent = c.name;
  var tagsEl = document.getElementById("modalTags");
  tagsEl.innerHTML = c.tags.map(function(t) { return "<span>" + t + "</span>"; }).join("");

  var poster = document.getElementById("modalPoster");
  var gradients = { "艺术": "linear-gradient(135deg,#7c3aed,#a78bfa)", "科技": "linear-gradient(135deg,#1e40af,#3b82f6)", "体育": "linear-gradient(135deg,#065f46,#10b981)", "文化": "linear-gradient(135deg,#1e3a5f,#475569)", "音乐": "linear-gradient(135deg,#831843,#db2777)" };
  poster.style.background = gradients[c.cat] || "linear-gradient(135deg,#1e3a5f,#2563eb)";

  var html = "<div class=\"info-section\"><div class=\"info-label\">社团介绍</div><p class=\"info-text\">" + c.fullIntro + "</p></div>";
  html += "<div class=\"info-section\"><div class=\"info-label\">关键词</div><div style=\"display:flex;flex-wrap:wrap;gap:6px\">" + c.keywords.map(function(kw) { return "<span style=\"background:#f1f5f9;color:#475569;font-size:12px;padding:3px 12px;border-radius:40px;font-weight:500\">" + kw + "</span>"; }).join("") + "</div></div>";

  if (c.extraMsg) {
    html += "<div class=\"join-message\"><div style=\"display:flex;gap:6px;align-items:flex-start\"><span class=\"quote-mark\"></span><p>" + c.extraMsg + "</p></div></div>";
  }
  if (c.img2) {
    html += "<div class=\"info-section\"><div class=\"info-label\">社团海报</div><div class=\"modal-picture\"><img src=\"" + c.img2 + "\" alt=\"\"></div></div>";
  }
  if (c.contactImg) {
    html += "<div class=\"info-section\"><div class=\"info-label\">联系方式</div><div class=\"modal-picture\"><img src=\"" + c.contactImg + "\"></div></div>";
  }
  if (c.contact) {
    html += "<div class=\"info-section\"><div class=\"info-label\">联系方式</div><p class=\"info-text\">" + c.contact + "</p></div>";
  }


  html += "<div class=\"modal-actions\"><button class=\"close-btn\" onclick=\"closeModal()\">关闭</button></div>";

  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

renderClubs(allClubs.slice(0, 12));
</script></body></html>
