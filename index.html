<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>建平中学 · 学校主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#111;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,.06);height:60px}
.nav-logo{font-weight:700;font-size:18px;color:#0a1628}
.nav-logo span{color:#2563eb}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{text-decoration:none;color:#475569;font-size:13px;font-weight:500}
.nav-links a:hover{color:#2563eb}
.nav-links .btn-nav{background:#2563eb;color:#fff!important;padding:6px 18px;border-radius:40px;font-weight:600}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1628,#15203a,#0d1a30);position:relative;overflow:hidden;padding-top:60px}
.hero::before{content:"";position:absolute;inset:0;background:url("jp.jpg") center/cover no-repeat;opacity:.35;filter:saturate(.7)}
.hero-content{position:relative;z-index:2;text-align:center;padding:20px;max-width:720px}
.hero-badge{display:inline-block;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);color:#60a5fa;font-size:11px;font-weight:600;letter-spacing:2px;padding:5px 18px;border-radius:40px;margin-bottom:18px}
.hero-content h1{font-size:clamp(2.4rem,7vw,4.2rem);font-weight:900;color:#fff;line-height:1.12;margin-bottom:14px}
.hero-content h1 .hl{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.hero-content p{color:#94a3b8;font-size:16px;line-height:1.7;max-width:560px;margin:0 auto 28px}
.btn-primary{display:inline-block;padding:12px 32px;border-radius:40px;background:#2563eb;color:#fff;text-decoration:none;font-weight:600;font-size:15px;transition:background .2s;border:none;cursor:pointer}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{display:inline-block;padding:12px 32px;border-radius:40px;background:transparent;color:#e2e8f0;text-decoration:none;font-weight:500;font-size:15px;border:1px solid rgba(255,255,255,.2)}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stats{display:flex;justify-content:center;gap:48px;padding:50px 20px;background:#fff;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:34px;font-weight:900;color:#0f172a}
.stat-num span{color:#2563eb}
.stat-label{font-size:13px;color:#64748b;margin-top:2px}
footer{text-align:center;padding:24px 20px;color:#94a3b8;font-size:12px;border-top:1px solid #e2e8f0;background:#fff}
</style>
</head>
<body>
<nav>
<div class="nav-logo">建平<span>·</span>社团</div>
<div class="nav-links"><a href="index.html" class="btn-nav">学校主页</a><a href="club.html" >社团风采</a></div>
</nav>
<section class="hero" id="hero">
<div class="hero-content">
<div class="hero-badge">上海市建平中学</div>
<h1><span class="hl">建平中学 · 社团巡礼</span></h1>
<p>上海市建平中学始建于 1944 年，是上海市首批实验性示范性高中。契承“合格+特长、规范+选择”的办学理念，拥有数十个特色学生社团，涵盖科技、人文、艺术、体育等领域。</p>
<div class="hero-actions">
<a class="btn-primary" href="club.html">探索社团</a>
</div>
</div>
</section>
<div class="stats">
<div class="stat"><div class="stat-num">1944</div><div class="stat-label">建校年份</div></div>
<div class="stat"><div class="stat-num">50+</div><div class="stat-label">学生社团</div></div>
<div class="stat"><div class="stat-num">3000+</div><div class="stat-label">在校学生</div></div>
</div>
<footer>上海市建平中学 © 2026 · JEEK信息社  ©  联系作者：lovelyhjqhs@gmail.com</footer>
</body>
</html>
